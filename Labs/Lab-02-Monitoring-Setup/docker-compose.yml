# Prometheus + Grafana for the Kafka admin training cluster.
# Kafka brokers themselves run OUTSIDE Docker (via ../kafka-lab/cluster.sh) —
# these two containers just scrape their JMX-exporter endpoints and visualise.
#
# Bring up:   ./up.sh           (regenerates prometheus.yml, then docker compose up -d)
# Bring down: ./down.sh         (or:  ./down.sh -v   to wipe volumes)
#
# Do NOT run `docker compose up -d` directly — prometheus.yml is templated
# from prometheus.yml.template with the host IP substituted by ./up.sh.
#
# URLs (after ./up.sh):
#   Prometheus  http://localhost:9090
#   Grafana     http://localhost:3000    (admin / admin)

services:

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: kafka-lab-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=6h
      - --web.enable-lifecycle

  grafana:
    image: grafana/grafana-oss:11.4.0
    container_name: kafka-lab-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ./grafana-provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana

volumes:
  prometheus-data:
  grafana-data:
