# =====================================================================
# SLF4J SimpleLogger config for the training lab.
#
# Baseline strategy:
#   defaultLogLevel = warn          → Kafka internals stay quiet
#   com.example      = info         → app logs (Sent / received / lag) always show
#   selected loggers = info         → coordinator + rebalance events always show
#
# Uncomment the "scenario" loggers below only when a specific demo needs them,
# then re-comment so subsequent runs stay readable.
# =====================================================================

org.slf4j.simpleLogger.defaultLogLevel=warn
org.slf4j.simpleLogger.log.com.example=info

# ---- ALWAYS ON: consumer group lifecycle -----------------------------
# Coordinator discovery, (re)join, sync, heartbeats, generation changes.
org.slf4j.simpleLogger.log.org.apache.kafka.clients.consumer.internals.AbstractCoordinator=info
# Partition assignment/revocation, offset commits, rebalance callbacks.
org.slf4j.simpleLogger.log.org.apache.kafka.clients.consumer.internals.ConsumerCoordinator=info
# subscribe(), poll(), assignment(), close() — the top-level consumer surface.
org.slf4j.simpleLogger.log.org.apache.kafka.clients.consumer.KafkaConsumer=info

# ---- ALWAYS ON: producer transactions --------------------------------
# initTransactions, beginTransaction, commit/abort, coordinator discovery.
org.slf4j.simpleLogger.log.org.apache.kafka.clients.producer.internals.TransactionManager=info

# ---- ALWAYS ON: Kafka Streams lifecycle ------------------------------
# App state transitions (CREATED → REBALANCING → RUNNING → PENDING_SHUTDOWN).
org.slf4j.simpleLogger.log.org.apache.kafka.streams.KafkaStreams=info
# Per-thread state, task assignment, standby restoration.
org.slf4j.simpleLogger.log.org.apache.kafka.streams.processor.internals.StreamThread=info

# ---- SCENARIO OPT-IN: uncomment only when the demo calls for it ------
#   Scenario 4  (broker down / metadata refresh) → Sender + Metadata
#   Scenario 11 (idempotence toggle)             → Sender
#   Scenario 13 (timeout hierarchy)              → Sender + NetworkClient

# Producer send-path: retries, batching, in-flight tracking.
# org.slf4j.simpleLogger.log.org.apache.kafka.clients.producer.internals.Sender=debug

# Connection lifecycle: which broker, disconnects, "connection could not be established".
# org.slf4j.simpleLogger.log.org.apache.kafka.clients.NetworkClient=info

# Metadata refresh: NOT_LEADER_OR_FOLLOWER triggers a refresh here.
# org.slf4j.simpleLogger.log.org.apache.kafka.clients.Metadata=info

# Fetch requests and responses (very chatty at debug).
# org.slf4j.simpleLogger.log.org.apache.kafka.clients.consumer.internals.Fetcher=debug

# ---- output formatting -----------------------------------------------
org.slf4j.simpleLogger.showDateTime=true
org.slf4j.simpleLogger.dateTimeFormat=HH:mm:ss.SSS
org.slf4j.simpleLogger.showThreadName=false
# Show the class name (short form) so trainees can tell which component logged what.
org.slf4j.simpleLogger.showShortLogName=true
org.slf4j.simpleLogger.showLogName=false
org.slf4j.simpleLogger.levelInBrackets=true
