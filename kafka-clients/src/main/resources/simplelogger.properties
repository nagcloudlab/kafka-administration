# Default: quiet Kafka internals, keep our own app logs visible.
org.slf4j.simpleLogger.defaultLogLevel=warn
org.slf4j.simpleLogger.log.com.example=info

# ---- Optional: uncomment ONE or MORE of these when a scenario in
#      Producer-Teaching-Sequence (kafka-clients/src/main/java/com/example/producer/README.md)
#      requires seeing internal producer behavior. Re-comment after the scenario
#      so subsequent runs stay quiet.
#
#  Which loggers to uncomment per producer scenario:
#    - Scenario 4  (broker down / metadata refresh) → Sender + Metadata
#    - Scenario 11 (idempotence toggle)             → Sender
#    - Scenario 13 (timeout hierarchy)              → Sender + NetworkClient

# Producer send-path: retries, batching, in-flight tracking.
# org.slf4j.simpleLogger.log.org.apache.kafka.clients.producer.internals.Sender=debug

# Connection lifecycle: which broker, disconnects, "connection could not be established".
# org.slf4j.simpleLogger.log.org.apache.kafka.clients.NetworkClient=info

# Metadata refresh: NOT_LEADER_OR_FOLLOWER triggers a refresh here.
# org.slf4j.simpleLogger.log.org.apache.kafka.clients.Metadata=info

# Consumer group lifecycle: joins, assignments, heartbeats, and coordinator changes.
# org.slf4j.simpleLogger.log.org.apache.kafka.clients.consumer.internals.ConsumerCoordinator=debug
# org.slf4j.simpleLogger.log.org.apache.kafka.clients.consumer.internals.AbstractCoordinator=debug

org.slf4j.simpleLogger.showDateTime=true
org.slf4j.simpleLogger.dateTimeFormat=HH:mm:ss.SSS
org.slf4j.simpleLogger.showThreadName=false
org.slf4j.simpleLogger.showLogName=false
org.slf4j.simpleLogger.levelInBrackets=true
