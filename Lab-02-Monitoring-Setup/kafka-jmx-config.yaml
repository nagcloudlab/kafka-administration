# jmx_prometheus_javaagent config for the training cluster.
#
# Deliberately compact — surfaces ONLY the metrics used by the Chapter 1-4
# scenarios plus a handful of general-health signals. In production you'd use
# a much larger config (see prometheus/jmx_exporter/example_configs/kafka-*.yml).

lowercaseOutputName: true
lowercaseOutputLabelNames: true

rules:

  # -------- Broker / topic byte and message rates --------

  - pattern: 'kafka.server<type=BrokerTopicMetrics, name=(BytesInPerSec|BytesOutPerSec|MessagesInPerSec|TotalProduceRequestsPerSec|TotalFetchRequestsPerSec)><>OneMinuteRate'
    name: kafka_broker_$1
    type: GAUGE

  - pattern: 'kafka.server<type=BrokerTopicMetrics, name=(BytesInPerSec|BytesOutPerSec|MessagesInPerSec), topic=(.+)><>OneMinuteRate'
    name: kafka_topic_$1
    labels:
      topic: "$2"
    type: GAUGE

  # -------- Replica manager (URP, UnderMinISR, PartitionCount, LeaderCount) --------

  - pattern: 'kafka.server<type=ReplicaManager, name=(.+)><>Value'
    name: kafka_server_replica_manager_$1
    type: GAUGE

  # -------- Controller (offline partitions, active controller count) --------

  - pattern: 'kafka.controller<type=KafkaController, name=(.+)><>Value'
    name: kafka_controller_$1
    type: GAUGE

  # -------- Controller stats (unclean elections) --------

  - pattern: 'kafka.controller<type=ControllerStats, name=UncleanLeaderElectionsPerSec><>Count'
    name: kafka_controller_unclean_leader_elections_total
    type: COUNTER

  - pattern: 'kafka.controller<type=ControllerStats, name=(.+)><>(Count|OneMinuteRate)'
    name: kafka_controller_stats_$1
    labels:
      metric: "$2"
    type: GAUGE

  # -------- Request-handler idleness (CPU pressure proxy) --------

  - pattern: 'kafka.server<type=KafkaRequestHandlerPool, name=RequestHandlerAvgIdlePercent><>OneMinuteRate'
    name: kafka_broker_request_handler_avg_idle_percent
    type: GAUGE

  # -------- Log cleaner health --------
  # Two forms: with logDirectory label (per-dir metrics), and without (global).

  - pattern: 'kafka.log<type=LogCleanerManager, name=(uncleanable-bytes|uncleanable-partitions-count), logDirectory=(.+)><>Value'
    name: kafka_log_cleaner_$1
    labels:
      log_directory: "$2"
    type: GAUGE

  - pattern: 'kafka.log<type=LogCleanerManager, name=(.+)><>Value'
    name: kafka_log_cleaner_$1
    type: GAUGE

  # -------- Per-partition log stats (Size, LogEndOffset, NumLogSegments) --------
  # Only appear once a topic-partition has been written to.

  - pattern: 'kafka.log<type=Log, name=(Size|LogEndOffset|LogStartOffset|NumLogSegments), topic=(.+), partition=(.+)><>Value'
    name: kafka_log_$1
    labels:
      topic: "$2"
      partition: "$3"
    type: GAUGE

  # -------- Request queue backpressure --------

  - pattern: 'kafka.network<type=RequestChannel, name=(RequestQueueSize|ResponseQueueSize)><>Value'
    name: kafka_network_$1
    type: GAUGE

  # -------- Network processor idleness (I/O thread CPU) --------

  - pattern: 'kafka.network<type=SocketServer, name=NetworkProcessorAvgIdlePercent><>Value'
    name: kafka_network_processor_avg_idle_percent
    type: GAUGE

  # -------- Client throttle time (Sc 4.2 quotas) --------
  # Two shapes: (user, client-id) with SASL, or just client-id when unauthenticated.
  # More specific rule first.

  - pattern: 'kafka.server<type=(Produce|Fetch|Request), user=(.+), client-id=(.+)><>throttle-time'
    name: kafka_client_throttle_time_ms
    labels:
      request: "$1"
      user: "$2"
      client_id: "$3"
    type: GAUGE

  - pattern: 'kafka.server<type=(Produce|Fetch|Request), client-id=(.+)><>throttle-time'
    name: kafka_client_throttle_time_ms
    labels:
      request: "$1"
      client_id: "$2"
    type: GAUGE

  # -------- Network request latency (99th percentile per request type) --------

  - pattern: 'kafka.network<type=RequestMetrics, name=TotalTimeMs, request=(.+)><>99thPercentile'
    name: kafka_request_total_time_ms_p99
    labels:
      request: "$1"
    type: GAUGE

  # -------- JVM heap --------

  - pattern: 'java.lang<type=Memory><HeapMemoryUsage>used'
    name: jvm_memory_heap_used_bytes
    type: GAUGE

  - pattern: 'java.lang<type=Memory><HeapMemoryUsage>max'
    name: jvm_memory_heap_max_bytes
    type: GAUGE
